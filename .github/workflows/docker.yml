name: Build & Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:        # Manueller Trigger jederzeit möglich

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # merlin2533/kundefutter

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # nötig für ghcr.io push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # automatisch vorhanden, keine Konfiguration nötig

      - name: Docker Metadata (Tags & Labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # latest bei jedem push auf main
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # Versions-Tag z.B. v1.2.3 → 1.2.3
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # Kurzer Commit-Hash immer
            type=sha,prefix=,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha          # GitHub Actions Cache → schnellere Builds
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Image pushed → ${{ steps.meta.outputs.tags }}"
