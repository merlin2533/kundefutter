<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline – AgrarOffice</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #f9fafb; color: #374151;
      padding: 1rem;
    }
    .container { text-align: center; max-width: 400px; }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #111827; }
    p { margin-bottom: 1.5rem; color: #6b7280; line-height: 1.5; }
    button {
      background: #16a34a; color: white; border: none; padding: 0.75rem 1.5rem;
      border-radius: 0.5rem; font-size: 1rem; cursor: pointer;
    }
    button:active { background: #15803d; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Keine Verbindung</h1>
    <p>AgrarOffice benötigt eine Internetverbindung. Bitte prüfen Sie Ihre Netzwerkverbindung und versuchen Sie es erneut.</p>
    <button onclick="window.location.reload()">Erneut versuchen</button>
  </div>
</body>
</html>
