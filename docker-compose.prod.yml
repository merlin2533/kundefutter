# ── Produktion (fertiges Image von ghcr.io ziehen) ────────────────────────────
# docker compose -f docker-compose.prod.yml up -d
#
# Erstes Mal oder nach Update:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
services:
  kundefutter:
    image: ghcr.io/merlin2533/kundefutter:latest
    ports:
      - "8080:3000"
    volumes:
      - kundefutter_data:/data
      - kundefutter_uploads:/app/public/uploads
    environment:
      - DATABASE_URL=file:/data/kundefutter.db
      - NODE_ENV=production
    restart: unless-stopped

  backup:
    image: keinos/sqlite3:latest
    volumes:
      - kundefutter_data:/data:ro
      - kundefutter_backups:/backups
      - ./backup.sh:/backup.sh:ro
    entrypoint: /bin/sh
    command: >
      -c "echo '0 2 * * * /bin/sh /backup.sh' | crontab - && crond -f -l 2"
    restart: unless-stopped

volumes:
  kundefutter_data:
  kundefutter_uploads:
  kundefutter_backups:
